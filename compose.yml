services:
  db:
    image: postgres:15-alpine
    container_name: dvsregister-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - dvsregister-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 20

  localstack:
    image: localstack/localstack:3.5
    container_name: dvsregister-localstack
    environment:
      SERVICES: s3
      AWS_DEFAULT_REGION: eu-west-2
      DEBUG: "0"
    ports:
      - "4566:4566"
    volumes:
      - dvsregister-localstack-data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:4566/_localstack/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20

  dvsregister:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dvsregister-app
    depends_on:
      db:
        condition: service_healthy
      localstack:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=db;Port=5432;Database=postgres;Username=postgres;Password=postgres
      AWS__Region: eu-west-2
      AWS__ServiceURL: http://localstack:4566
      AWS__S3__BucketName: s3-dvs-dev20240529103145426300000001
      AWS__S3__ForcePathStyle: "true"
    ports:
      - "8080:8080"

volumes:
  dvsregister-postgres-data:
  dvsregister-localstack-data:
