version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 100
    groups:
      non-major:
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "npm"
    directory: "DVSAdmin"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 100
    groups:
      npm:
        update-types:
          - "major"
          - "minor"
          - "patch"
